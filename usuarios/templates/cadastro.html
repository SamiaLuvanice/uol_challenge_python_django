{% extends 'base.html' %} {% block 'body' %}

<div class="container">
  <form action="{% url 'cadastro' %}" method="POST">
    {% csrf_token %}
    <br />
    <div class="mb-3">{{ form.nome.as_field_group }}</div>
    <div class="mb-3">{{ form.email.as_field_group }}</div>
    <div class="mb-3">{{ form.telefone.as_field_group }}</div>
    <div class="mb-3">{{ form.grupo.as_field_group }}</div>
    <input type="submit" class="btn btn-success" value="Cadastro" data-mask="(00) 00000-0000" />
  </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.cloudflare.com/ajax/libs/jquery.mask/1.14.16/dist/js/jquery.mask.min.js"></script>

{% endblock 'body' %}
